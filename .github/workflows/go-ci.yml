name: Go CI

on:
  workflow_call:          # ← this MUST be here, it's what makes it reusable
    inputs:
      service-name:
        required: true
        type: string

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      # Each job checks out the repo because jobs run on separate runners.
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      # Lint first so style and static analysis issues fail fast.
      - uses: golangci/golangci-lint-action@v6
        with:
          version: latest

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      # Run all Go tests before compiling or packaging the service.
      - run: go test -v ./...

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      # Confirm the application compiles cleanly for this commit.
      - run: go build ./...

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      # Build the image without pushing so CI verifies the Dockerfile works.
      - name: Build Docker image
        run: |
          docker build -t ${{ inputs.service-name }}:ci .
